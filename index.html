<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gregor egan ///</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <!-- Open Graph -->
    <meta property="og:title" content="gregor egan ///">
    <meta property="og:description" content="Photography and Design">
    <meta property="og:image" content="https://gregoregan.com/photos%20webp/photo%20webp/digital/EGANGREGOR-1828.webp">
    <meta property="og:url" content="https://gregoregan.com">
    <meta name="description" content="Gregor Egan is a Los Angeles based photographer, designer, and sound artist.">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
 
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI',
                Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #0a0a0a;
            color: #0a0a0a;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }

        /* ==================== BACKGROUND ==================== */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            /* Swap in your image: */
            background-image: url('BLUR.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            /* gradient overlay. darkens bottom for name legibility */
            background-color: #0a0a0a;
        }

        .bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--overlay-gradient);
        }

        /* ==================== LAYOUT ==================== */
        .wrapper {
            position: relative;
            z-index: 1;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 36px 40px;
        }

        /* ==================== TOP ROW ==================== */
        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        /* Stacked nav -- top left */
        nav.main-nav {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        nav.main-nav a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 1;
            transition: opacity 0.2s ease;
            font-weight: 400;
            line-height: 1.4;
        }

        nav.main-nav a:hover {
            opacity: 1;
        }

        /* Utility icons -- top right */
        .utility-nav {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .utility-nav a {
            color: var(--text-color);
            opacity: 1;
            transition: opacity 0.2s ease;
            display: flex;
            align-items: center;
        }

        .utility-nav a:hover {
            opacity: 1;
        }

        /* ==================== BOTTOM ROW ==================== */
        .bottom-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .site-name {
            font-size: clamp(28px, 5vw, 72px);
            font-weight: 700;
            letter-spacing: -3px;
            text-transform: uppercase;
            line-height: 0.88;
            color: #fff;
            white-space: nowrap;
        }

        .bio {
            position: absolute;
            right: 450px;
            top: 30%;
            transform: translateY(-80%);
            font-size: 12px;
            line-height: 1.6;
            white-space: nowrap;
        }

        .bio-real {
            opacity: 0;
            position: absolute;
        }

        .bio-scramble {
            opacity: 0.8;
        }

        /* ==================== RESPONSIVE ==================== */
        @media (max-width: 900px) {
            .wrapper {
                padding: 28px 24px;
            }

            .site-name {
                letter-spacing: -2px;
            }

            .bio {
                display: none;
            }
        }

        @media (max-width: 600px) {
            .wrapper {
                padding: 22px 20px;
            }

            .site-name {
                font-size: 44px;
                letter-spacing: -1.5px;
            }

            nav.main-nav a {
                font-size: 12px;
                letter-spacing: 2px;
            }
        }
    </style>
</head>
<body>

    <div class="bg"></div>

    <div class="wrapper">

        <!-- TOP -->
        <div class="top-row">
            <nav class="main-nav">
                <a href="/photos/">Photo</a>
                <a href="/design/">Design</a>
            </nav>

            <div class="utility-nav">
                <a href="https://www.instagram.com/gregor.egan" target="_blank" aria-label="Instagram">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                    </svg>
                </a>
                <a href="mailto:gregor.art@pm.me" aria-label="Email">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                </a>
            </div>
        </div>

        <!-- BOTTOM -->
        <div class="bottom-row">
            <div class="site-name">Gregor Egan <span style="position: relative; bottom: 5px; display: inline-block; transform: scaleY(0.8);"> / / /</span></div>
        </div>

        <!-- FLOATING BIO -->
        <div class="bio">
            <span class="bio-real">Los Angeles based photographer, designer, and sound artist.</span>
            <span class="bio-scramble" aria-hidden="true"></span>
        </div>

    </div>

    <script>
        // apply saved theme for cross page consistency (toggle is on other pages)
        const currentTheme = localStorage.getItem('theme') || 'light';
        if (currentTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }

        // text scramble on bio - animates a decorative overlay only
        // real sentence lives in .bio-real the whole time, so crawlers
        // and screen readers always see the actual text, never garbled mid-animation frames - Gregor.
        function scrambleText(realEl, scrambleEl) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*';
            const finalText = realEl.textContent;
            const duration = 2000;
            const fps = 60;
            const totalFrames = duration / (1000 / fps);
            let frame = 0;

            const animate = () => {
                let output = '';
                const progress = frame / totalFrames;

                for (let i = 0; i < finalText.length; i++) {
                    if (finalText[i] === ' ') {
                        output += ' ';
                    } else if (i < finalText.length * progress) {
                        output += finalText[i];
                    } else {
                        output += chars[Math.floor(Math.random() * chars.length)];
                    }
                }

                scrambleEl.textContent = output;
                frame++;

                if (frame <= totalFrames) {
                    requestAnimationFrame(animate);
                } else {
                    scrambleEl.textContent = finalText;
                }
            };

            animate();
        }

        const realBio = document.querySelector('.bio-real');
        const scrambleBio = document.querySelector('.bio-scramble');
        if (realBio && scrambleBio) scrambleText(realBio, scrambleBio);
    </script>

</body>
</html>
