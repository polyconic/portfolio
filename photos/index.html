<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photos - Gregor Egan</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #0a0a0a;
            --text-color: #f5f5f5;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 
                Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 24px 40px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo {
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            transition: opacity 0.2s ease;
            display: flex;
            align-items: center;
        }

        .nav-links a:hover {
            opacity: 0.5;
        }

        .nav-links svg {
            display: block;
        }

        main {
            flex: 1;
            display: flex;
            padding: 60px 40px;
            gap: 60px;
            align-items: center;
            justify-content: center;
        }

        .sections {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 80px;
        }

        .section-item {
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .section-title h2 {
            font-size: clamp(48px, 10vw, 120px);
            font-weight: 700;
            letter-spacing: -2px;
            text-transform: uppercase;
            line-height: 1;
        }

        .section-item:hover .section-title h2 {
            opacity: 0.6;
            transition: opacity 0.2s ease;
        }

        footer {
            padding: 24px 40px;
            font-size: 12px;
            color: var(--text-color);
            text-align: center;
        }

        @media (max-width: 900px) {
            header {
                padding: 20px;
                align-items: center;
            }

            .logo {
                font-size: 12px;
            }

            .nav-links {
                gap: 16px;
            }

            .nav-links svg {
                width: 18px;
                height: 18px;
            }

            main {
                padding: 40px 20px;
            }

            .section-title h2 {
                font-size: 64px;
                letter-spacing: -1.5px;
            }

            .sections {
                gap: 60px;
                width: 100%;
            }

            footer {
                padding: 20px;
                font-size: 11px;
            }
        }

        @media (max-width: 600px) {
            header {
                padding: 16px 20px;
                gap: 12px;
            }

            .logo {
                font-size: 11px;
            }

            .nav-links {
                gap: 12px;
            }

            .section-title h2 {
                font-size: 48px;
                letter-spacing: -1px;
            }

            .sections {
                gap: 50px;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo" style="text-decoration: none; color: inherit;">Gregor Egan</a>
        <nav class="nav-links">
            <a href="https://www.instagram.com/gregor.egan" target="_blank" aria-label="Instagram">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                    <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                    <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                </svg>
            </a>
            <a href="mailto:gregor.art@pm.me" aria-label="Email">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
            </a>
        </nav>
    </header>

    <main>
        <div class="sections">
            <a href="digital.html" class="section-item">
                <div class="section-title">
                    <h2>Digital</h2>
                </div>
            </a>

            <a href="analog.html" class="section-item">
                <div class="section-title">
                    <h2>Analog</h2>
                </div>
            </a>
        </div>
    </main>

    <footer>
        &copy; 2026 GREGOR EGAN
    </footer>

    <script>
    </script>
</body>
</html>
